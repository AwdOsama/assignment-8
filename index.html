<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/all.min.css" />
    <link rel="stylesheet" href="css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/media.css" />
    <title>What's For Dinner</title>
  </head>
  <body>
    <header>
      <nav class="navbar navbar-expand-lg bg-white">
        <div class="container">
          <div class="navbar-brand d-flex align-items-center gap-3">
            <div
              class="nav-icon d-flex align-items-center justify-content-center rounded-circle"
            >
              <i class="fa-solid fa-utensils fs-5 text-white"></i>
            </div>
            <div class="nav-contant">
              <h1 class="mb-0 text-black fw-bold fs-4">What's For Dinner</h1>
              <p class="mt-0 mb-0 pra fs-6">Your daily meal inspiration</p>
            </div>
          </div>
          <button
            class="navbar-toggler border-0"
            type="button "
            data-bs-toggle="collapse"
            data-bs-target="#navbarSupportedContent"
            aria-controls="navbarSupportedContent"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <i class="fa-solid fa-bars"></i>
          </button>
          <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav ms-auto mb-2 mb-lg-0 d-flex">
              <li class="nav-item">
                <a class="nav-link active" aria-current="page" href="#"
                  ><i class="fa-solid fa-bookmark pra2 fs-5"></i
                ></a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="#"
                  ><i class="fa-solid fa-clock-rotate-left fs-5 pra2"></i
                ></a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="#"
                  ><i class="fa-solid fa-gear pra2 fs-5"></i
                ></a>
              </li>
              <li class="nav-item">
                <a class="nav-link p-0" href="#"
                  ><img
                    src="images/avatar-3.jpg"
                    alt="person"
                    class="rounded-circle border-img"
                    style="width: 40px; height: 40px"
                /></a>
              </li>
            </ul>
          </div>
        </div>
      </nav>
    </header>
    <main>
      <section class="hero pt-5 shadow">
        <div class="container ">
          <div class="row g-0 shadow rounded-4">
            <div class="col-12 col-lg-5 position-relative left-side ">
              <img
                src="images/food-1.jfif"
                alt="food"
                class="w-100 rounded-4 h-100"
                id="food-img"
              />

              <div
                class="position-absolute top-badge-img bg-white rounded-pill d-flex align-items-center gap-2"
              >
                <i class="fa-solid fa-star"></i>
                <span class="fw-semibold" id="rate"></span>
                <span class="pra small" id="review"></span>
              </div>

              <div class="position-absolute footer-img w-100 px-4 pb-3">
                <div class="bg-white rounded-4 p-3">
                  <div class="row text-center g-0">
                    <div class="col-4">
                      <div class="d-flex flex-column align-items-center">
                        <i class="fa-solid fa-clock fs-4 text-warning"></i>
                        <p class="pra mb-0 fs-6 fw-normal">Prep Time</p>
                        <span class="fw-bold mt-0" id="prep-time"></span>
                      </div>
                    </div>
                    <div class="col-4">
                      <div class="d-flex flex-column align-items-center">
                        <i class="fa-solid fa-fire-burner fs-4 text-danger"></i>
                        <p class="pra mb-0 fs-6 fw-normal">Cook Time</p>
                        <span class="fw-bold mt-0" id="cook-time"></span>
                      </div>
                    </div>

                    <div class="col-4">
                      <div class="d-flex flex-column align-items-center">
                        <i class="fa-solid fa-users fs-4 text-primary"></i>
                        <p class="pra mb-0 fs-6 fw-normal">Servings</p>
                        <span class="fw-bold mt-0" id="servings"></span>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
            <div class="col-12 col-lg-7 right-side bg-white ">
              <div
                class="meal-icon d-flex align-items-center gap-3 d-md-none justify-content-end mb-3 "
              >
                <div
                  class="icon-meal d-flex align-items-center justify-content-center bg-main-color rounded-3"
                  style="width: 40px; height: 40px"
                >
                  <i class="fa-solid fa-bookmark main-color"></i>
                </div>
                <div
                  class="icon-meal d-flex align-items-center justify-content-center bg-main-color rounded-3"
                  style="width: 40px; height: 40px"
                >
                  <i class="fa-solid fa-share-nodes main-color"></i>
                </div>
              </div>

              <div class="top-badges mb-3 d-flex align-items-center gap-3">
                <span
                  class="bg-green text-success rounded-pill"
                  id="level"
                ></span>
                <span
                  class="bg-blue text-primary rounded-pill"
                  id="type"
                ></span>
              </div>
              <div
                class="meal-name d-flex align-items-center justify-content-between"
              >
                <h2 class="fs-2 fw-bold" id="name"></h2>
                <div
                  class="meal-icon d-none d-md-flex align-items-md-center gap-3"
                >
                  <div
                    class="icon-meal d-flex align-items-center justify-content-center bg-main-color rounded-3"
                    style="width: 40px; height: 40px"
                  >
                    <i class="fa-solid fa-bookmark main-color"></i>
                  </div>
                  <div
                    class="icon-meal d-flex align-items-center justify-content-center bg-main-color rounded-3"
                    style="width: 40px; height: 40px"
                  >
                    <i class="fa-solid fa-share-nodes main-color"></i>
                  </div>
                </div>
              </div>
              <p class="pra3 fs-5" id="desc"></p>
              <div class="warnning rounded-3 mb-3" id="warnning">
                <div class="d-flex align-items-center gap-3">
                  <i class="fa-solid fa-triangle-exclamation text-danger"></i>
                  <div class="d-flex flex-column gap-1">
                    <h3 class="mb-0 mt-0 fw-semibold fs-6 text-danger">
                      Extended Preparation Time
                    </h3>
                    <p class="mt-0 mb-0 small text-danger">
                      This recipe requires more than 45 minutes to prepare. Plan
                      accordingly!
                    </p>
                  </div>
                </div>
              </div>
              <div class="w-100 border-bottom pb-4">
                <ul
                  class="nav nav-tabs border-bottom d-flex justify-content-center"
                  id="propertyTab"
                  role="tablist"
                >
                  <li class="nav-item" role="presentation">
                    <button
                      class="nav-link active d-flex align-items-center gap-2"
                      id="ingredients-tab"
                      data-bs-toggle="tab"
                      data-bs-target="#ingredients"
                      type="button"
                      role="tab"
                      aria-controls="ingredients"
                      aria-selected="true"
                    >
                      <i class="fa-solid fa-list-check"></i> Ingredients
                    </button>
                  </li>

                  <li class="nav-item" role="presentation">
                    <button
                      class="nav-link d-flex align-items-center gap-2"
                      id="instructions-tab"
                      data-bs-toggle="tab"
                      data-bs-target="#instructions"
                      type="button"
                      role="tab"
                      aria-controls="instructions"
                      aria-selected="false"
                    >
                      <i class="fa-solid fa-book-open"></i> Instructions
                    </button>
                  </li>

                  <li class="nav-item" role="presentation">
                    <button
                      class="nav-link d-flex align-items-center gap-2"
                      id="Nutrition-tab"
                      data-bs-toggle="tab"
                      data-bs-target="#Nutrition"
                      type="button"
                      role="tab"
                      aria-controls="Nutrition"
                      aria-selected="false"
                    >
                      <i class="fa-solid fa-chart-pie"></i> Nutrition
                    </button>
                  </li>

                  <li class="nav-item" role="presentation">
                    <button
                      class="nav-link d-flex align-items-center gap-2"
                      id="chefs-tips-tab"
                      data-bs-toggle="tab"
                      data-bs-target="#chefs-tips"
                      type="button"
                      role="tab"
                      aria-controls="chefs-tips"
                      aria-selected="false"
                    >
                      <i class="fa-solid fa-lightbulb"></i> Chef's Tips
                    </button>
                  </li>
                </ul>

                <div class="tab-content mt-4" id="propertyTabContent">
                  <div
                    class="tab-pane fade show active"
                    id="ingredients"
                    role="tabpanel"
                    aria-labelledby="ingredients-tab"
                  >
                    <div class="rounded-3 p-4 ingrad">
                      <ul
                        class="d-flex flex-column gap-2 list-unstyled"
                        id="ingredients-list"
                      ></ul>
                    </div>
                  </div>
                  <div
                    class="tab-pane fade"
                    id="instructions"
                    role="tabpanel"
                    aria-labelledby="instructions-tab instructions "
                  >
                    <div class="rounded-3 p-4 bg-white instructions">
                      <ul
                        class="d-flex flex-column gap-3 list-unstyled"
                        id="instructions-list"
                      ></ul>
                    </div>
                  </div>
                  <div
                    class="tab-pane fade"
                    id="Nutrition"
                    role="tabpanel"
                    aria-labelledby="nutrition-tab"
                  >
                    <div class="rounded-3 p-4 Nutrition">
                      <div class="row g-4">
                        <div class="col-12 col-md-6">
                          <div
                            class="nutrition-card p-3 d-flex align-items-center justify-content-between rounded-3"
                          >
                            <div
                              class="nutrition-card-left d-flex align-items-center gap-3"
                            >
                              <div
                                class="nutrition-card-icon d-flex align-items-center justify-content-center bg-main-color rounded-3"
                                style="width: 50px; height: 50px"
                              >
                                <i class="fa-solid fa-fire color-red"></i>
                              </div>
                              <span class="pra4 fw-medium">Calories </span>
                            </div>
                            <p class="mb-0 fw-bold fs-5" id="Calories"></p>
                          </div>
                        </div>
                        <div class="col-12 col-md-6">
                          <div
                            class="nutrition-card p-3 d-flex align-items-center justify-content-between rounded-3"
                          >
                            <div
                              class="nutrition-card-left d-flex align-items-center gap-3"
                            >
                              <div
                                class="nutrition-card-icon d-flex align-items-center justify-content-center bg-blue rounded-3"
                                style="width: 50px; height: 50px"
                              >
                                <i class="fa-solid fa-dumbbell color-blue"></i>
                              </div>
                              <span class="pra4 fw-medium">Protein </span>
                            </div>
                            <p class="mb-0 fw-bold fs-5" id="protein"></p>
                          </div>
                        </div>
                        <div class="col-12 col-md-6">
                          <div
                            class="nutrition-card p-3 d-flex align-items-center justify-content-between rounded-3"
                          >
                            <div
                              class="nutrition-card-left d-flex align-items-center gap-3"
                            >
                              <div
                                class="nutrition-card-icon d-flex align-items-center justify-content-center bg-yellow rounded-3"
                                style="width: 50px; height: 50px"
                              >
                                <i
                                  class="fa-solid fa-wheat-awn color-yellow"
                                ></i>
                              </div>
                              <span class="pra4 fw-medium">Carbohydrates </span>
                            </div>
                            <p class="mb-0 fw-bold fs-5" id="carbohydrates"></p>
                          </div>
                        </div>
                        <div class="col-12 col-md-6">
                          <div
                            class="nutrition-card p-3 d-flex align-items-center justify-content-between rounded-3"
                          >
                            <div
                              class="nutrition-card-left d-flex align-items-center gap-3"
                            >
                              <div
                                class="nutrition-card-icon d-flex align-items-center justify-content-center bg-red rounded-3"
                                style="width: 50px; height: 50px"
                              >
                                <i class="fa-solid fa-droplet color-red"></i>
                              </div>
                              <span class="pra4 fw-medium">Fat </span>
                            </div>
                            <p class="mb-0 fw-bold fs-5" id="fat"></p>
                          </div>
                        </div>
                        <div class="col-12 col-md-6">
                          <div
                            class="nutrition-card p-3 d-flex align-items-center justify-content-between rounded-3"
                          >
                            <div
                              class="nutrition-card-left d-flex align-items-center gap-3"
                            >
                              <div
                                class="nutrition-card-icon d-flex align-items-center justify-content-center bg-green rounded-3"
                                style="width: 50px; height: 50px"
                              >
                                <i class="fa-solid fa-seedling color-green"></i>
                              </div>
                              <span class="pra4 fw-medium">Fiber </span>
                            </div>
                            <p class="mb-0 fw-bold fs-5" id="fiber"></p>
                          </div>
                        </div>
                        <div class="col-12 col-md-6">
                          <div
                            class="nutrition-card p-3 d-flex align-items-center justify-content-between rounded-3"
                          >
                            <div
                              class="nutrition-card-left d-flex align-items-center gap-3"
                            >
                              <div
                                class="nutrition-card-icon d-flex align-items-center justify-content-center bg-pink rounded-3"
                                style="width: 50px; height: 50px"
                              >
                                <i class="fa-solid fa-cube color-pink"></i>
                              </div>
                              <span class="pra4 fw-medium">Sodium </span>
                            </div>
                            <p class="mb-0 fw-bold fs-5" id="sodium"></p>
                          </div>
                        </div>
                      </div>
                    </div>
                  </div>
                  <div
                    class="tab-pane fade"
                    id="chefs-tips"
                    role="tabpanel"
                    aria-labelledby="chefs-tips-tab"
                  >
                    <div class="rounded-3 p-4 bg-white chefs-tips">
                      <div
                        class="d-flex flex-column gap-3"
                        id="chef-tips-list"
                      ></div>
                    </div>
                  </div>
                </div>
              </div>
              <button
                class="btn-randow d-flex align-items-center gap-2"
                onclick="getRandomRecipe()"
              >
                <i class="fa-solid fa-arrows-rotate"></i> Try Another Recipe
              </button>
            </div>
          </div>
        </div>
      </section>
    </main>
    <script src="js/bootstrap.bundle.min.js"></script>
    <script src="js/index.js"></script>
  </body>
</html>
